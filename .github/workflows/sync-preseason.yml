name: Pre-season results sync

# Every hour during Jul–Aug (UTC). Also run manually after match days.
on:
  schedule:
    - cron: "0 * * 7,8 *"
  workflow_dispatch:

concurrency:
  group: preseason-results-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Sync pre-season scores and scorers
        working-directory: web
        run: npx tsx scripts/sync-preseason-results.ts

      - name: Commit updated pre-season JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/epl-preseason-2627.json
          if git diff --staged --quiet; then
            echo "No pre-season data changes to commit."
          else
            git commit -m "Sync pre-season friendly results and scorers."
            git push
          fi
