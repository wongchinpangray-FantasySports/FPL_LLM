name: User notification sync

# Superseded by daily-user-inbox.yml (07:00 Beijing). Kept for manual runs only.
on:
  workflow_dispatch:

concurrency:
  group: user-notifications-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Match news and results to user preferences
        working-directory: web
        run: npx tsx scripts/sync-user-notifications.ts
