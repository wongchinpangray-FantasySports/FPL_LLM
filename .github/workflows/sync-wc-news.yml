name: World Cup news sync

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: wc-news-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FPL_X_RSSHUB_BASE: http://localhost:1200
    services:
      rsshub:
        image: diygod/rsshub
        ports:
          - 1200:1200
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Wait for RSSHub (FPL X fallback)
        run: |
          for i in $(seq 1 18); do
            if curl -sf "http://localhost:1200/" >/dev/null; then
              echo "RSSHub ready"
              exit 0
            fi
            sleep 5
          done
          echo "RSSHub not ready — syndication-only sync"
          echo "FPL_X_RSSHUB_BASE=" >> "$GITHUB_ENV"

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Sync WC news RSS
        working-directory: web
        run: npx tsx scripts/sync-wc-news.ts
